<li class="flex items-center px-6 py-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group">
    <div class="flex items-center h-5">
        <input id="task-item-{{ task.id }}" name="task-item-{{ task.id }}" type="checkbox"
            class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 checked:bg-blue-600 dark:checked:bg-blue-500 checked:border-transparent focus:outline-none focus:ring-2 focus:ring-blue-500/20 dark:focus:ring-blue-500/40 transition-all accent-blue-600">

        <label for="task-item-{{ task.id }}" class="ml-4 text-sm font-medium text-slate-700 dark:text-slate-300 cursor-pointer select-none peer-checked:text-slate-400 dark:peer-checked:text-slate-500 peer-checked:line-through transition-all">
            {{ task.content }}
        </label>
    </div>

    <button class="ml-auto opacity-0 group-hover:opacity-100 text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 transition-opacity">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
    </button>
</li>
