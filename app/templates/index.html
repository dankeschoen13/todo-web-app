{% extends "base.html" %}


{% block title %}
    {{ super() }} | Home
{% endblock %}

{% block content %}

<div class="w-full flex justify-center mb-4">
    <div class="w-full max-w-md shrink-0">
        <form class="flex gap-2 w-full">
            <input id="new-list-input" type="text" placeholder="Add a new list..."
                class="flex-1 px-3 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 dark:focus:ring-blue-500/40 transition-all">
            
            <button
                onclick="addNewList()"
                type="button"
                title="Add new list"
                class="shrink-0 p-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 hover:scale-105 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                    </svg>
            </button>
        </form>
    </div>
</div>

<section class="w-full max-w-md shrink-0">
    
    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg overflow-hidden border border-slate-200 dark:border-slate-700 transition-colors duration-300">

        <div class="bg-slate-50 dark:bg-slate-900/50 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between group gap-4 transition-colors duration-300">
            <div class="flex-1 min-w-0 relative">
                <div id="header-view" onclick="enterEditMode(this)"
                     class="flex items-center gap-2 cursor-pointer hover:bg-slate-200/50 dark:hover:bg-slate-700/50 rounded-md px-2 py-1 -ml-2 transition-all">
                    <h2 id="display-text" class="text-xl font-bold text-slate-800 dark:text-slate-100 truncate transition-colors duration-300">My Tasks</h2>

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-slate-400 dark:text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                    </svg>
                </div>

                <input id="header-input" type="text" value="My Tasks"
                       class="hidden w-full absolute inset-0 text-xl font-bold text-slate-800 dark:text-slate-100 bg-white dark:bg-slate-800 border-2 border-blue-500 rounded-md px-2 focus:outline-none shadow-inner transition-colors duration-300"
                       onblur="exitEditMode(this)"
                       onkeydown="if(event.key === 'Enter') exitEditMode(this)">
            </div>
        </div>

        <ul class="divide-y divide-slate-100 dark:divide-slate-700/50 transition-colors duration-300">
            <li class="flex items-center px-6 py-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group">
                <div class="flex items-center h-5">
                    <input id="todo-1" name="todo-1" type="checkbox"
                        class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 checked:bg-blue-600 dark:checked:bg-blue-500 checked:border-transparent focus:outline-none focus:ring-2 focus:ring-blue-500/20 dark:focus:ring-blue-500/40 transition-all accent-blue-600">

                    <label for="todo-1" class="ml-4 text-sm font-medium text-slate-700 dark:text-slate-300 cursor-pointer select-none peer-checked:text-slate-400 dark:peer-checked:text-slate-500 peer-checked:line-through transition-all">
                        Design the database schema with SQLAlchemy
                    </label>
                </div>

                <button class="ml-auto opacity-0 group-hover:opacity-100 text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 transition-opacity">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </li>

            <li class="flex items-center px-6 py-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group">
                <div class="flex items-center h-5">
                    <input id="todo-2" name="todo-2" type="checkbox" checked
                        class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 checked:bg-blue-600 dark:checked:bg-blue-500 checked:border-transparent focus:outline-none focus:ring-2 focus:ring-blue-500/20 dark:focus:ring-blue-500/40 transition-all accent-blue-600">

                    <label for="todo-2" class="ml-4 text-sm font-medium text-slate-700 dark:text-slate-300 cursor-pointer select-none peer-checked:text-slate-400 dark:peer-checked:text-slate-500 peer-checked:line-through transition-all">
                        Initialize Tailwind CSS via NPM
                    </label>
                </div>
                <button class="ml-auto opacity-0 group-hover:opacity-100 text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 transition-opacity">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </li>
        </ul>

        <div class="px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-200 dark:border-slate-700 transition-colors duration-300">
            <form class="flex gap-2">
                <input type="text" placeholder="Add a new task..."
                    class="flex-1 px-3 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 dark:focus:ring-blue-500/40 transition-all">
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700 transition-colors">
                    Add
                </button>
            </form>
        </div>
    </div>
</section>

<div id="extra-lists-container" class="contents"></div>

{% endblock %}
