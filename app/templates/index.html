{% extends "base.html" %}


{% block title %}
    {{ super() }} | Home
{% endblock %}

{% block content %}

<div class="w-full flex justify-center mb-4">
    <div class="w-full max-w-md shrink-0">
        <form class="flex gap-2 w-full">
            <input id="new-list-input" type="text" placeholder="Add a new list..."
                class="flex-1 px-3 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 dark:focus:ring-blue-500/40 transition-all">
            
            <button
                onclick="addNewList()"
                type="button"
                title="Add new list"
                class="shrink-0 p-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 hover:scale-105 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                    </svg>
            </button>
        </form>
    </div>
</div>

{% for todo_list in user_lists %}
    {% include "components/task-list.html" %}
{% endfor %}

<div id="extra-lists-container" class="contents"></div>

{% endblock %}
